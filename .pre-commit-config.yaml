repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.11
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: local
    hooks:
      # Runs on commit — only when Python source files are staged
      - id: pytest-unit
        name: pytest (unit)
        entry: uv run python -m pytest -q --disable-warnings tests/unit
        language: system
        types: [python]
        files: ^(core/|tests/unit/|analyze\.py)
        pass_filenames: false

      # Runs on push — only when Python source files are in the pushed diff
      - id: bandit
        name: bandit
        entry: uv run bandit -c pyproject.toml -r core analyze.py
        language: system
        types: [python]
        files: ^(core/|analyze\.py)
        stages: [pre-push]

      - id: semgrep
        name: semgrep
        entry: uv run semgrep --config auto --error
        language: system
        types: [python]
        files: ^(core/|analyze\.py)
        stages: [pre-push]

      - id: pytest-integration
        name: pytest (integration + acceptance)
        entry: uv run python -m pytest -q --disable-warnings tests/integration tests/acceptance
        language: system
        types: [python]
        files: ^(core/|tests/integration/|tests/acceptance/|analyze\.py)
        pass_filenames: false
        stages: [pre-push]
