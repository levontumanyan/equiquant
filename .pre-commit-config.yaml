fail_fast: true
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.11
    hooks:
      - id: ruff
        args: [--fix]
        stages: [pre-commit]
      - id: ruff-format
        stages: [pre-commit]
  - repo: local
    hooks:
      # Runs on commit — only when Python source files are staged
      - id: pytest-unit
        name: pytest (unit)
        entry: uv run python -m pytest -q --disable-warnings tests/unit
        language: system
        types: [python]
        files: ^(core/|tests/unit/)
        pass_filenames: false
        stages: [pre-commit]

      - id: ts-type-check
        name: TypeScript Type Check
        entry: uv run bash -c "cd ui && pnpm exec tsc -b"
        language: system
        files: ^ui/.*\.(ts|tsx)$
        pass_filenames: false
        stages: [pre-commit]

      # Runs on push — only when Python source files are in the pushed diff
      - id: pytest-integration
        name: pytest (integration + acceptance)
        entry: uv run python -m pytest -q --disable-warnings tests/integration tests/acceptance
        language: system
        types: [python]
        files: ^(core/|tests/integration/|tests/acceptance/)
        pass_filenames: false
        stages: [pre-push]

      - id: bandit
        name: bandit
        entry: uv run bandit -c pyproject.toml -r core
        language: system
        types: [python]
        files: ^core/
        stages: [pre-push]

      - id: semgrep
        name: semgrep
        entry: uv run semgrep --config auto --error
        language: system
        types: [python]
        files: ^core/
        stages: [pre-push]
