repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version.
    rev: v0.15.11
    hooks:
      # Run the linter.
      - id: ruff
        args: [ --fix, --verbose ]
      # Run the formatter.
      - id: ruff-format
        args: [ --verbose ]
  - repo: local
    hooks:
      - id: bandit
        name: bandit
        entry: uv run bandit -c pyproject.toml -r core analyze.py
        language: system
        types: [python]
      - id: semgrep
        name: semgrep
        entry: uv run semgrep --config auto --error
        language: system
        types: [python]
      - id: pytest
        name: pytest
        entry: uv run python -m pytest -q --cov=core --cov-report=term-missing:skip-covered
        language: system
        types: [python]
        pass_filenames: false
        always_run: true
        verbose: true
